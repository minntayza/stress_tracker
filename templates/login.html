{% extends "base.html" %}
{% block title %}Sign In · MindCheck{% endblock %}

{% block content %}
<div class="container container-auth py-5">
    <div class="auth-card result-card">
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to your MindCheck account</p>

        <form method="POST" action="{{ url_for('login') }}" novalidate>
            <div class="field-group">
                <label class="field-label" for="username">Username or Email</label>
                <input type="text" id="username" name="username" class="form-control field-input"
                    placeholder="you@example.com" required autocomplete="username">
            </div>

            <div class="field-group">
                <label class="field-label" for="password">Password</label>
                <div class="pw-wrap">
                    <input type="password" id="password" name="password" class="form-control field-input"
                        placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="pw-toggle" id="pwToggle" aria-label="Toggle password visibility">
                        <i class="bi bi-eye" id="pwIcon"></i>
                    </button>
                </div>
            </div>

            <div class="d-flex align-items-center justify-content-between mb-4">
                <label class="d-flex align-items-center gap-2 small text-muted">
                    <input type="checkbox" name="remember"> Remember me
                </label>
            </div>

            <button type="submit" class="btn btn-wizard-primary w-100">
                Sign In <i class="bi bi-arrow-right ms-1"></i>
            </button>

            <p class="text-center small text-muted mt-4">
                Don't have an account?
                <a href="{{ url_for('signup') }}" class="link-accent">Create one</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    const btn = document.getElementById('pwToggle');
    const inp = document.getElementById('password');
    const ico = document.getElementById('pwIcon');
    btn && btn.addEventListener('click', () => {
        inp.type = inp.type === 'password' ? 'text' : 'password';
        ico.className = inp.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
    });
</script>
{% endblock %}
